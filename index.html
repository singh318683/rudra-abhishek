<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>रुद्र अभिषेक — पूजा मार्गदर्शक</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Tiro+Devanagari+Hindi&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#03080f;--s1:#060d18;--s2:#0a1520;--s3:#0f1e2e;
  --gold:#c9960c;--gold2:#e8b84b;--gold3:#f5d080;
  --saf:#d4780a;--cream:#e8d5b0;--mute:#5a7a9a;
  --bdr:#1a3050;
  --green:#0a3a1a;--greenb:#1a6a2a;--greent:#70d090;
  --tip:#0a1a10;--tipb:#1a5030;--tipt:#80c090;
  --bluet:#90c0f0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--cream);font-family:'Tiro Devanagari Hindi',Georgia,serif;min-height:100vh;overflow-x:hidden}

#splash{position:fixed;inset:0;z-index:100;overflow:hidden;transition:opacity 1.2s ease;background:#03080f}
#splash.hide{opacity:0;pointer-events:none}
#splashCanvas{position:absolute;inset:0;width:100%;height:100%}
.splash-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:10vh;pointer-events:none}
.splash-warcry{font-family:'Cinzel',serif;font-size:clamp(22px,6vw,42px);font-weight:600;letter-spacing:6px;color:var(--gold2);text-align:center;text-shadow:0 0 30px rgba(232,184,75,0.8),0 0 60px rgba(232,184,75,0.4);animation:warcryPulse 1.8s ease-in-out infinite;margin-bottom:6px}
@keyframes warcryPulse{0%,100%{opacity:.7;transform:scale(1);letter-spacing:6px}50%{opacity:1;transform:scale(1.04);letter-spacing:8px}}
.splash-subtitle{font-size:clamp(13px,3vw,18px);color:var(--cream);letter-spacing:3px;opacity:.8;margin-bottom:4px;text-align:center;font-family:'Cinzel',serif}
.splash-hindi{font-size:clamp(14px,3.5vw,20px);color:var(--cream);opacity:.7;margin-bottom:28px;text-align:center}
.start-btn{padding:14px 44px;border-radius:30px;border:2px solid var(--gold);background:rgba(201,150,12,0.15);color:var(--gold2);font-size:18px;cursor:pointer;font-family:'Tiro Devanagari Hindi',serif;transition:all .3s;letter-spacing:1px;pointer-events:all;backdrop-filter:blur(4px);box-shadow:0 0 20px rgba(201,150,12,0.3)}
.start-btn:hover{background:var(--gold);color:#000;box-shadow:0 0 40px rgba(201,150,12,0.7)}
.splash-diyas{display:flex;gap:18px;margin-bottom:18px}
.diya-flame{width:8px;height:14px;background:var(--gold2);border-radius:50% 50% 40% 40%;animation:diayFlicker 0.9s ease-in-out infinite alternate;box-shadow:0 0 8px var(--gold2),0 0 16px rgba(232,184,75,0.5)}
.diya-flame:nth-child(2){animation-delay:.3s;animation-duration:1.1s}
.diya-flame:nth-child(3){animation-delay:.6s;animation-duration:.8s}
@keyframes diayFlicker{0%{transform:scaleX(1) scaleY(1)}100%{transform:scaleX(.7) scaleY(1.2)}}
.om-badge{font-size:36px;color:var(--gold2);text-shadow:0 0 20px rgba(232,184,75,0.9);margin-bottom:4px;animation:omPulse 2.5s ease-in-out infinite}
@keyframes omPulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
@keyframes ringOut{0%{opacity:.8;transform:scale(.6)}100%{opacity:0;transform:scale(1.4)}}

#app{display:none;min-height:100vh}

.topbar{background:var(--s1);border-bottom:1px solid var(--bdr);padding:.8rem 1rem;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.tb-om{font-size:24px;color:var(--gold2)}
.tb-info{flex:1}
.tb-step-label{font-family:'Cinzel',serif;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--mute)}
.tb-step-name{font-size:14px;color:var(--cream);font-weight:500}
.tb-prog-outer{height:4px;background:var(--bdr);border-radius:2px;margin-top:4px}
.tb-prog-inner{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;transition:width .6s ease}
.tb-count{font-family:'Cinzel',serif;font-size:12px;color:var(--mute);white-space:nowrap}

.step-wrap{min-height:100vh;display:flex;flex-direction:column}
.step-scene{flex:1;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 1rem}

.anim-stage{width:100%;max-width:340px;height:220px;background:linear-gradient(180deg,#0a1f3a 0%,#051020 60%,#03080f 100%);border:1px solid #1a3a5a;border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;position:relative;overflow:hidden}
.anim-icon{font-size:72px;animation:iconFloat 3s ease-in-out infinite;position:relative;z-index:2}
@keyframes iconFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.anim-ring{position:absolute;width:100px;height:100px;border-radius:50%;border:2px solid var(--gold);opacity:0;animation:aRing 2s ease-out infinite}
.anim-ring:nth-child(2){animation-delay:.7s}
.anim-ring:nth-child(3){animation-delay:1.4s}
@keyframes aRing{0%{opacity:.6;transform:scale(.5)}100%{opacity:0;transform:scale(2)}}
.drop{position:absolute;width:4px;height:10px;background:var(--bluet);border-radius:50%;opacity:0;animation:dropFall 1.5s linear infinite}
@keyframes dropFall{0%{opacity:1;transform:translateY(-10px)}100%{opacity:0;transform:translateY(180px)}}
.flame{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:30px;background:var(--gold);border-radius:50% 50% 20% 20%;animation:flicker 1s ease-in-out infinite alternate}
@keyframes flicker{0%{height:60px;transform:translateX(-50%) scaleX(1)}100%{height:80px;transform:translateX(-50%) scaleX(.8)}}
.particle{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--gold2);opacity:0;animation:partFloat 2s ease-out infinite}
@keyframes partFloat{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0)}}

.step-content{width:100%;max-width:480px}
.step-header{text-align:center;margin-bottom:1.5rem;animation:fadeUp .6s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.step-num-badge{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;border:2px solid var(--gold);color:var(--gold);font-family:'Cinzel',serif;font-size:14px;font-weight:600;margin-bottom:8px}
.step-title{font-size:22px;font-weight:500;color:var(--gold2);margin-bottom:4px}
.step-sub{font-family:'Cinzel',serif;font-size:11px;color:var(--mute);letter-spacing:2px;text-transform:uppercase}

.mantra-box{background:var(--s2);border:1px solid var(--gold);border-radius:16px;padding:1.2rem;margin-bottom:1.2rem;animation:fadeUp .6s ease .1s both}
.mantra-label{font-family:'Cinzel',serif;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--gold);margin-bottom:8px}
.mantra-text{font-size:17px;line-height:1.9;color:var(--gold2);margin-bottom:4px}
.mantra-roman{font-size:12px;color:var(--mute);margin-bottom:6px;font-style:italic;line-height:1.6}
.mantra-meaning{font-size:13px;color:var(--mute);line-height:1.6;margin-bottom:10px}
.mantra-btns{display:flex;gap:8px;flex-wrap:wrap}
.m-btn{padding:6px 14px;border-radius:14px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .2s;font-family:'Tiro Devanagari Hindi',serif}
.m-btn:hover,.m-btn.playing{background:var(--gold);color:#000}
.m-btn.loop-on{background:var(--saf);border-color:var(--saf);color:#fff}

/* ═══════════════════════════════════════════
   ITEMS GRID — SPECTACULAR ANIMATIONS
═══════════════════════════════════════════ */
.items-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));
  gap:12px;margin-bottom:1.4rem;
  perspective:800px;
}

/* ── CARD BASE ── */
.item-chip{
  position:relative;cursor:pointer;
  transform-style:preserve-3d;
  transition:transform .15s ease;
  border-radius:16px;
  /* no bg here — handled by inner */
}
.chip-inner{
  position:relative;
  background:linear-gradient(145deg,#0f1e30 0%,#0a1520 50%,#060d18 100%);
  border:1px solid rgba(60,80,120,0.6);
  border-radius:16px;
  padding:14px 8px 11px;
  text-align:center;
  overflow:hidden;
  transition:border-color .3s, box-shadow .3s;
  transform-style:preserve-3d;
}

/* ── ANIMATED BORDER GRADIENT ── */
.chip-inner::before{
  content:'';position:absolute;inset:-1px;border-radius:17px;
  background:conic-gradient(from var(--a,0deg),transparent 60%,#c9960c 70%,#f5d080 75%,#c9960c 80%,transparent 90%);
  -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor; mask-composite:exclude;
  padding:1px;opacity:0;transition:opacity .4s;
  animation:rotateBorder 3s linear infinite paused;
}
.item-chip:hover .chip-inner::before{ opacity:1; animation-play-state:running; }
@property --a{ syntax:'<angle>'; initial-value:0deg; inherits:false; }
@keyframes rotateBorder{ to{ --a:360deg; } }

/* ── INNER GLOW LAYERS ── */
.chip-inner::after{
  content:'';position:absolute;inset:0;border-radius:16px;
  background:radial-gradient(ellipse at 50% 0%,rgba(201,150,12,0.18) 0%,transparent 65%);
  opacity:0;transition:opacity .3s;
}
.item-chip:hover .chip-inner::after{ opacity:1; }

/* ── LIQUID FILL (checked) ── */
.chip-liquid{
  position:absolute;bottom:0;left:0;right:0;height:0%;
  background:linear-gradient(180deg,rgba(45,180,70,0.35) 0%,rgba(20,100,40,0.6) 100%);
  transition:height .7s cubic-bezier(.23,1,.32,1);
  border-radius:0 0 16px 16px;
  overflow:hidden;
}
.chip-liquid::before{
  content:'';position:absolute;top:-6px;left:-20%;width:140%;height:14px;
  background:rgba(60,200,90,0.5);border-radius:50%;
  animation:liquidWave 1.8s ease-in-out infinite;
}
@keyframes liquidWave{
  0%,100%{transform:translateX(0) scaleY(1)}
  50%{transform:translateX(5%) scaleY(1.3)}
}
.item-chip.checked .chip-liquid{ height:100%; }

/* ── ICON ── */
.chip-icon{
  display:block;font-size:28px;margin-bottom:7px;
  position:relative;z-index:2;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  filter:drop-shadow(0 3px 6px rgba(0,0,0,0.5));
  animation:chipFloat 3s ease-in-out infinite;
}
.item-chip:nth-child(2n) .chip-icon{animation-delay:.4s}
.item-chip:nth-child(3n) .chip-icon{animation-delay:.8s}
.item-chip:nth-child(4n) .chip-icon{animation-delay:1.2s}
.item-chip:nth-child(5n) .chip-icon{animation-delay:1.6s}
@keyframes chipFloat{
  0%,100%{transform:translateY(0) rotate(0deg)}
  30%{transform:translateY(-4px) rotate(-3deg)}
  70%{transform:translateY(-2px) rotate(2deg)}
}
.item-chip:hover .chip-icon{
  transform:translateY(-6px) scale(1.25) rotate(-5deg) !important;
  filter:drop-shadow(0 6px 12px rgba(201,150,12,0.5));
}
.item-chip.checked .chip-icon{
  animation:checkedSpin .5s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes checkedSpin{
  0%{transform:scale(1) rotate(0)}
  40%{transform:scale(1.4) rotate(15deg)}
  70%{transform:scale(.85) rotate(-5deg)}
  100%{transform:scale(1) rotate(0)}
}

/* ── LABEL ── */
.chip-label{
  font-size:11px;color:var(--cream);line-height:1.3;font-weight:500;
  position:relative;z-index:2;transition:color .3s, transform .3s;
  display:block;
}
.item-chip:hover .chip-label{ color:var(--gold2); transform:scale(1.05); }
.item-chip.checked .chip-label{ color:#7eff9a; font-weight:600; }

/* ── TICK BADGE ── */
.item-chip .tick{
  position:absolute;top:6px;right:6px;
  width:20px;height:20px;
  background:linear-gradient(135deg,#2dbc4e,#1a8a30);
  border-radius:50%;color:#fff;font-size:11px;font-weight:700;
  display:none;align-items:center;justify-content:center;
  box-shadow:0 0 12px rgba(45,188,78,0.8),0 0 24px rgba(45,188,78,0.3);
  z-index:3;
}
.item-chip.checked .tick{
  display:flex;
  animation:tickExplode .4s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes tickExplode{
  0%{transform:scale(0) rotate(-180deg);opacity:0}
  60%{transform:scale(1.3) rotate(10deg);opacity:1}
  100%{transform:scale(1) rotate(0);opacity:1}
}

/* ── STAGGERED ENTRANCE ── */
.item-chip{animation:chipReveal .5s cubic-bezier(.34,1.56,.64,1) both}
.item-chip:nth-child(1){animation-delay:.03s}
.item-chip:nth-child(2){animation-delay:.07s}
.item-chip:nth-child(3){animation-delay:.11s}
.item-chip:nth-child(4){animation-delay:.15s}
.item-chip:nth-child(5){animation-delay:.19s}
.item-chip:nth-child(6){animation-delay:.23s}
.item-chip:nth-child(7){animation-delay:.27s}
.item-chip:nth-child(8){animation-delay:.31s}
.item-chip:nth-child(9){animation-delay:.35s}
.item-chip:nth-child(10){animation-delay:.39s}
.item-chip:nth-child(11){animation-delay:.43s}
.item-chip:nth-child(12){animation-delay:.47s}
.item-chip:nth-child(13){animation-delay:.51s}
.item-chip:nth-child(14){animation-delay:.55s}
.item-chip:nth-child(15){animation-delay:.59s}
.item-chip:nth-child(16){animation-delay:.63s}
@keyframes chipReveal{
  from{opacity:0;transform:translateY(30px) scale(.7) rotateX(30deg)}
  to{opacity:1;transform:translateY(0) scale(1) rotateX(0)}
}

/* ── CHECKED CARD GLOW PULSE ── */
.item-chip.checked .chip-inner{
  border-color:rgba(45,188,78,0.7);
  box-shadow:0 0 20px rgba(45,188,78,0.25),inset 0 0 20px rgba(45,188,78,0.05);
  animation:checkedPulse 2s ease-in-out infinite;
}
@keyframes checkedPulse{
  0%,100%{box-shadow:0 0 15px rgba(45,188,78,0.2),inset 0 0 15px rgba(45,188,78,0.04)}
  50%{box-shadow:0 0 30px rgba(45,188,78,0.4),inset 0 0 25px rgba(45,188,78,0.08)}
}

/* ── SPARKLES on hover ── */
.chip-sparkle{
  position:absolute;width:4px;height:4px;border-radius:50%;
  background:var(--gold2);pointer-events:none;z-index:4;
  opacity:0;
}



/* ═══════════════════════════════════════════
   INSTRUCTIONS — CINEMATIC SEQUENTIAL REVEAL
═══════════════════════════════════════════ */
.instr-list{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:1.2rem}

.instr-list li{
  display:flex;gap:14px;font-size:15px;line-height:1.7;
  background:linear-gradient(135deg,#0a1828 0%,#060e18 100%);
  border:1px solid rgba(50,80,130,0.5);
  border-radius:14px;padding:12px 14px;
  cursor:pointer;position:relative;overflow:hidden;
  /* start hidden — JS reveals them one by one */
  opacity:0;transform:translateX(-40px) scale(0.95);
  transition:
    opacity .0s,
    transform .0s,
    background .3s,
    border-color .3s,
    box-shadow .3s;
}
.instr-list li.revealed{
  animation:instrSlideIn .5s cubic-bezier(.34,1.4,.64,1) forwards;
  opacity:1;
}
@keyframes instrSlideIn{
  0%  {opacity:0;transform:translateX(-50px) scale(0.92)}
  60% {opacity:1;transform:translateX(6px)   scale(1.01)}
  80% {transform:translateX(-3px) scale(0.99)}
  100%{opacity:1;transform:translateX(0)    scale(1)}
}

/* shimmer sweep on reveal */
.instr-list li.revealed::before{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(201,150,12,0.12),transparent);
  animation:instrShimmer .7s ease forwards;
}
@keyframes instrShimmer{from{left:-100%}to{left:150%}}

/* active step — glowing gold */
.instr-list li.active-inst{
  border-color:var(--gold) !important;
  background:linear-gradient(135deg,#1a1408 0%,#0f0e04 100%) !important;
  box-shadow:0 0 20px rgba(201,150,12,0.2),inset 0 0 20px rgba(201,150,12,0.05);
  animation:instrSlideIn .5s cubic-bezier(.34,1.4,.64,1) forwards, activeGlow 2s ease-in-out infinite .5s !important;
}
@keyframes activeGlow{
  0%,100%{box-shadow:0 0 15px rgba(201,150,12,0.15),inset 0 0 15px rgba(201,150,12,0.04)}
  50%    {box-shadow:0 0 30px rgba(201,150,12,0.35),inset 0 0 25px rgba(201,150,12,0.08)}
}
.instr-list li.active-inst .inst-num{background:var(--gold) !important;color:#000 !important;animation:numPop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes numPop{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}

/* done — green check, text stays fully visible, NEVER hides */
.instr-list li.done{
  opacity:1 !important;
  transform:translateX(0) scale(1) !important;
  background:linear-gradient(135deg,#081808 0%,#051205 100%) !important;
  border-color:rgba(45,122,45,0.6) !important;
  box-shadow:none !important;
  animation:none !important;
}
.instr-list li.done .inst-num{background:var(--greenb) !important;color:#fff !important}
.instr-list li.done .inst-text{color:var(--cream) !important;text-decoration:none !important;opacity:1 !important}

/* number badge */
.inst-num{
  width:28px;height:28px;border-radius:50%;
  background:rgba(40,60,100,0.8);color:var(--mute);
  font-size:12px;font-family:'Cinzel',serif;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:2px;
  transition:background .3s,color .3s;
  border:1px solid rgba(80,120,180,0.3);
}
.inst-text{flex:1;transition:color .3s}

/* progress bar under instructions */
.instr-progress{
  height:3px;background:rgba(40,60,100,0.4);border-radius:2px;
  margin-bottom:1.2rem;overflow:hidden;
}
.instr-progress-bar{
  height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));
  border-radius:2px;width:0%;transition:width .5s ease;
  box-shadow:0 0 8px rgba(201,150,12,0.5);
}


.tip-box{background:var(--tip);border:1px solid var(--tipb);border-radius:12px;padding:12px 14px;margin-bottom:1.2rem;font-size:14px;color:var(--tipt);line-height:1.7;display:flex;gap:10px;animation:fadeUp .6s ease .25s both}

.nav-row{display:flex;gap:10px;padding:1rem;max-width:480px;width:100%;animation:fadeUp .6s ease .3s both}
.nav-btn{flex:1;padding:14px;border-radius:14px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid var(--bdr);background:var(--s2);color:var(--mute);font-family:'Cinzel',serif;transition:all .2s}
.nav-btn:hover{border-color:var(--gold);color:var(--gold2)}
.nav-btn:disabled{opacity:.25;cursor:default}
.nav-btn.next{background:var(--gold);border-color:var(--gold);color:#000;font-weight:600;font-size:15px;animation:glow 2s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(201,150,12,0)}50%{box-shadow:0 0 16px 4px rgba(201,150,12,.4)}}
.nav-btn.next:hover{background:var(--gold2)}
.nav-btn.complete{background:var(--green);border-color:var(--greenb);color:var(--greent);font-size:15px}

.chant-bar{background:var(--s3);border-top:1px solid var(--bdr);padding:.6rem 1rem;display:flex;align-items:center;gap:10px;position:sticky;bottom:0;z-index:40}
.chant-word{font-size:14px;color:var(--gold2);flex:1;font-weight:500}
.chant-count{font-size:12px;color:var(--mute);font-family:'Cinzel',serif}
.chant-stop{padding:4px 12px;border-radius:10px;border:1px solid var(--bdr);background:transparent;color:var(--mute);font-size:11px;cursor:pointer;transition:all .2s}
.chant-stop:hover{border-color:#e07070;color:#e07070}
#chantBar{display:none}

.step-scene.slide-out{animation:slideOut .3s ease forwards}
.step-scene.slide-in{animation:slideIn .4s ease forwards}
@keyframes slideOut{to{opacity:0;transform:translateX(-40px)}}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>

<div id="splash">
  <canvas id="splashCanvas"></canvas>
  <div class="splash-overlay">
    <div class="om-badge">ॐ</div>
    <div class="splash-warcry">हर हर महादेव</div>
    <div class="splash-subtitle">HAR HAR MAHADEV</div>
    <div class="splash-hindi">रुद्र अभिषेक — पूजा मार्गदर्शक</div>
    <div class="splash-diyas">
      <div class="diya-flame"></div>
      <div class="diya-flame"></div>
      <div class="diya-flame"></div>
    </div>
    <button class="start-btn" id="startBtn">पूजा प्रारम्भ करें 🙏</button>
  </div>

var cur=0, chanting=false, vizTimer=null, synth=window.speechSynthesis;
var hv=null, chantCount=0, ttsOn=false;

// ── Background Om Namah Shivaya — Isolated iframe TTS ──
// Uses a hidden iframe with its own speechSynthesis context
// completely separate from the main page TTS queue
var bgOmActive = false, bgOmFrame = null;

function startBgOm(){
  if(bgOmActive) return;
  bgOmActive = true;
  if(!bgOmFrame) createBgOmFrame();
  bgOmFrame.style.display = 'block';
  sendOmCommand('start');
}

function stopBgOm(){
  bgOmActive = false;
  if(bgOmFrame) sendOmCommand('stop');
}

function sendOmCommand(cmd){
  try{
    if(bgOmFrame && bgOmFrame.contentWindow){
      bgOmFrame.contentWindow.postMessage(cmd, '*');
    }
  } catch(e){}
}

function createBgOmFrame(){
  bgOmFrame = document.createElement('iframe');
  bgOmFrame.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;border:none;top:0;left:0;z-index:-1';

  // self-contained Om chanting page inside the iframe
  var iframeContent = '<!DOCTYPE html><html><body><script>\n'
  + 'var active=false, timer=null;\n'
  + 'var synth=window.speechSynthesis;\n'
  + 'var hv=null;\n'
  + 'function loadV(){\n'
  + '  var v=synth.getVoices();\n'
  + '  for(var i=0;i<v.length;i++){ if(v[i].lang==="hi-IN"){hv=v[i];break;} }\n'
  + '  if(!hv){ for(var i=0;i<v.length;i++){ if(v[i].lang.indexOf("hi")===0){hv=v[i];break;} } }\n'
  + '}\n'
  + 'if(synth.onvoiceschanged!==undefined) synth.onvoiceschanged=loadV;\n'
  + 'setTimeout(loadV,300); setTimeout(loadV,1000);\n'
  + 'function chant(){\n'
  + '  if(!active) return;\n'
  + '  var u=new SpeechSynthesisUtterance("ॐ नमः शिवाय");\n'
  + '  u.lang="hi-IN";\n'
  + '  if(hv) u.voice=hv;\n'
  + '  u.rate=0.5;\n'
  + '  u.pitch=0.8;\n'
  + '  u.volume=0.4;\n'
  + '  u.onend=function(){ if(active) timer=setTimeout(chant,4000); };\n'
  + '  u.onerror=function(){ if(active) timer=setTimeout(chant,3000); };\n'
  + '  synth.cancel();\n'
  + '  synth.speak(u);\n'
  + '}\n'
  + 'window.addEventListener("message",function(e){\n'
  + '  if(e.data==="start"){ loadV(); active=true; chant(); }\n'
  + '  else if(e.data==="stop"){ active=false; clearTimeout(timer); synth.cancel(); }\n'
  + '});\n'
  + '<\/script></body></html>';

  bgOmFrame.src = 'data:text/html;charset=utf-8,' + encodeURIComponent(iframeContent);
  document.body.appendChild(bgOmFrame);
}

function loadVoice(){
  var v=synth.getVoices();
  for(var i=0;i<v.length;i++){ if(v[i].lang==='hi-IN'){hv=v[i];return;} }
  for(var i=0;i<v.length;i++){ if(v[i].lang.indexOf('hi')===0){hv=v[i];return;} }
  if(v.length>0) hv=v[0];
}
if(synth.onvoiceschanged!==undefined) synth.onvoiceschanged=loadVoice;
setTimeout(loadVoice,200); setTimeout(loadVoice,800); setTimeout(loadVoice,2000);

// ALL speech in Hindi
function speakHindi(txt, rate, onEnd){
  synth.cancel();
  setTimeout(function(){
    var u=new SpeechSynthesisUtterance(txt);
    u.lang='hi-IN';
    if(hv) u.voice=hv;
    u.rate=rate||0.82;
    u.pitch=0.92;
    u.volume=1.0;
    u.onend=onEnd||function(){};
    u.onerror=function(e){ if(e.error!=='interrupted'&&onEnd) onEnd(); };
    synth.speak(u);
  },80);
}

function doChant(){
  if(!chanting) return;
  var key=(STEPS[cur].mantra)?STEPS[cur].mantra.key:0;
  var m=MANTRAS_CHANT[key];
  chantCount++;
  document.getElementById('chantWord').textContent=m.name;
  document.getElementById('chantCount').textContent='जाप संख्या: '+chantCount;
  speakHindi(m.tts, 0.65, function(){ if(chanting) setTimeout(doChant,700); });
}

function startChant(key,label){
  loadVoice();
  if(STEPS[cur].mantra) STEPS[cur].mantra.key=key;
  chanting=true; chantCount=0;
  document.getElementById('chantBar').style.display='flex';
  document.getElementById('chantWord').textContent=label||MANTRAS_CHANT[key].name;
  startViz(); doChant();
}

function stopChant(){
  chanting=false; synth.cancel(); clearInterval(vizTimer);
  document.getElementById('chantBar').style.display='none';
  document.querySelectorAll('.m-btn.loop-on').forEach(function(b){
    b.classList.remove('loop-on'); b.textContent='🔁 जाप शुरू करें';
  });
  stopViz();
  if(!bgOmActive) startBgOm();
}

function startViz(){
  clearInterval(vizTimer);
  vizTimer=setInterval(function(){
    document.querySelectorAll('.vb').forEach(function(b){
      b.style.height=(4+Math.random()*22)+'px'; b.classList.add('on');
    });
  },180);
}
function stopViz(){
  clearInterval(vizTimer);
  document.querySelectorAll('.vb').forEach(function(b){ b.style.height='4px'; b.classList.remove('on'); });
}

document.getElementById('chantStopBtn').addEventListener('click',stopChant);

function buildAnim(stepIdx){
  var stage = document.getElementById('animStage');
  stage.innerHTML = '';

  // Canvas fills the stage
  var canvas = document.createElement('canvas');
  canvas.width  = 340;
  canvas.height = 220;
  canvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border-radius:20px';
  stage.appendChild(canvas);
  var ctx = canvas.getContext('2d');

  // cancel previous frame
  if(window._animRAF) cancelAnimationFrame(window._animRAF);
  var t = 0;

  // viz bars overlay
  var vr = document.createElement('div');
  vr.style.cssText = 'position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:3px;align-items:flex-end;height:16px;z-index:4';
  for(var b=0;b<9;b++){
    var bar = document.createElement('div'); bar.className='vb';
    bar.style.cssText='width:4px;background:var(--gold);border-radius:2px;height:4px;opacity:.4;transition:height .1s';
    vr.appendChild(bar);
  }
  stage.appendChild(vr);

  // ── shared draw helpers ──────────────────────────────
  function drawBg(){
    var g = ctx.createLinearGradient(0,0,0,220);
    g.addColorStop(0,'#07111f'); g.addColorStop(1,'#030a14');
    ctx.fillStyle=g; ctx.fillRect(0,0,340,220);
    // subtle stars
    ctx.fillStyle='rgba(255,255,255,0.5)';
    [[20,12],[60,8],[110,18],[180,6],[240,14],[300,10],[330,22]].forEach(function(s){
      ctx.beginPath(); ctx.arc(s[0],s[1],0.8,0,Math.PI*2); ctx.fill();
    });
  }

  // Shiva Lingam — centred at (cx,cy), scale sc
  function drawLingam(cx,cy,sc){
    sc=sc||1;
    // base (pitha) — elliptical
    ctx.fillStyle='#6a4a28';
    ctx.beginPath(); ctx.ellipse(cx,cy+sc*28,sc*22,sc*7,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#c9960c'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.ellipse(cx,cy+sc*28,sc*22,sc*7,0,0,Math.PI*2); ctx.stroke();
    // yoni plate
    ctx.fillStyle='#8a6a38';
    ctx.beginPath(); ctx.ellipse(cx,cy+sc*20,sc*18,sc*5,0,0,Math.PI*2); ctx.fill();
    // lingam shaft
    var lg = ctx.createLinearGradient(cx-sc*8,0,cx+sc*8,0);
    lg.addColorStop(0,'#a07850'); lg.addColorStop(0.4,'#d0a870'); lg.addColorStop(1,'#805a30');
    ctx.fillStyle=lg;
    ctx.beginPath();
    ctx.moveTo(cx-sc*8, cy+sc*20);
    ctx.lineTo(cx-sc*8, cy-sc*10);
    ctx.bezierCurveTo(cx-sc*8,cy-sc*28, cx+sc*8,cy-sc*28, cx+sc*8,cy-sc*10);
    ctx.lineTo(cx+sc*8, cy+sc*20);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#c9960c'; ctx.lineWidth=0.8; ctx.stroke();
    // gold band
    ctx.strokeStyle='#f5d080'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.ellipse(cx,cy,sc*8,sc*3,0,0,Math.PI*2); ctx.stroke();
    // vibhuti lines
    ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1;
    [-4,0,4].forEach(function(dy){
      ctx.beginPath(); ctx.moveTo(cx-sc*6,cy+dy); ctx.lineTo(cx+sc*6,cy+dy); ctx.stroke();
    });
    // glow halo
    var hg=ctx.createRadialGradient(cx,cy-sc*5,sc*2,cx,cy-sc*5,sc*28);
    hg.addColorStop(0,'rgba(201,150,12,0.18)'); hg.addColorStop(1,'rgba(201,150,12,0)');
    ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(cx,cy-sc*5,sc*28,0,Math.PI*2); ctx.fill();
    // flower offering on top
    ctx.fillStyle='#e85080';
    [[cx,cy-sc*36],[cx-sc*5,cy-sc*32],[cx+sc*5,cy-sc*32]].forEach(function(p){
      ctx.beginPath(); ctx.arc(p[0],p[1],sc*3,0,Math.PI*2); ctx.fill();
    });
    ctx.fillStyle='#ffaa00';
    ctx.beginPath(); ctx.arc(cx,cy-sc*34,sc*2,0,Math.PI*2); ctx.fill();
  }

  // stick person — pos (px,py), facing dir (1=right,-1=left)
  function drawPerson(px,py,pose,param){
    param=param||{};
    ctx.lineCap='round'; ctx.lineJoin='round';
    var sc = param.sc||1;
    var col = param.col||'#e8b84b';
    ctx.strokeStyle=col; ctx.fillStyle=col;

    var hs=16*sc; // head size
    // head
    ctx.lineWidth=2*sc;
    ctx.beginPath(); ctx.arc(px,py-hs*3.2,hs*0.7,0,Math.PI*2); ctx.stroke();
    // bindi
    ctx.fillStyle='#ff4444';
    ctx.beginPath(); ctx.arc(px,py-hs*3.7,hs*0.12,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=col; ctx.strokeStyle=col;

    // torso
    ctx.lineWidth=2.5*sc;
    ctx.beginPath(); ctx.moveTo(px,py-hs*2.5); ctx.lineTo(px,py-hs*0.8); ctx.stroke();

    if(pose==='pour'){
      // leaning forward, one arm extended pouring water
      var lean=param.lean||0;
      // left arm down at side
      ctx.lineWidth=2*sc;
      ctx.beginPath(); ctx.moveTo(px,py-hs*2.2); ctx.lineTo(px-hs*0.6,py-hs*1.2); ctx.stroke();
      // right arm extended forward+down (pouring)
      var armAngle = -0.3 + 0.15*Math.sin(param.t||0);
      var ax = px+hs*1.4+lean, ay = py-hs*2+hs*0.5;
      ctx.beginPath(); ctx.moveTo(px,py-hs*2.2); ctx.lineTo(ax,ay); ctx.stroke();
      // jug/kalash in hand
      ctx.fillStyle='#c9960c';
      ctx.beginPath(); ctx.ellipse(ax,ay,hs*0.4,hs*0.55,0.3,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#f5d080'; ctx.lineWidth=1; ctx.stroke();
      // water stream
      ctx.strokeStyle='rgba(100,160,255,0.8)'; ctx.lineWidth=1.5*sc;
      var wt=param.t||0;
      ctx.beginPath(); ctx.moveTo(ax+hs*0.2,ay+hs*0.4);
      for(var i=0;i<6;i++){
        ctx.lineTo(ax+hs*0.2+i*2+(hs*0.3), ay+hs*0.4+i*6+3*Math.sin(wt+i));
      }
      ctx.stroke();
      ctx.strokeStyle=col;
      // legs
      ctx.lineWidth=2*sc;
      ctx.beginPath(); ctx.moveTo(px,py-hs*0.8); ctx.lineTo(px-hs*0.5,py); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px,py-hs*0.8); ctx.lineTo(px+hs*0.4,py); ctx.stroke();

    } else if(pose==='offer'){
      // both hands extended offering flowers/items
      var bob = Math.sin((param.t||0)*1.5)*3;
      ctx.lineWidth=2*sc;
      // left arm up offering
      ctx.beginPath(); ctx.moveTo(px,py-hs*2.2); ctx.lineTo(px-hs*1.1,py-hs*2.6+bob); ctx.stroke();
      // right arm up offering
      ctx.beginPath(); ctx.moveTo(px,py-hs*2.2); ctx.lineTo(px+hs*1.1,py-hs*2.6+bob); ctx.stroke();
      // item in hands (flower)
      ctx.fillStyle='#e85080';
      ctx.beginPath(); ctx.arc(px-hs*1.1,py-hs*2.7+bob,hs*0.35,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(px+hs*1.1,py-hs*2.7+bob,hs*0.35,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffaa00';
      ctx.beginPath(); ctx.arc(px-hs*1.1,py-hs*2.7+bob,hs*0.18,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(px+hs*1.1,py-hs*2.7+bob,hs*0.18,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=col;
      // legs
      ctx.lineWidth=2*sc;
      ctx.beginPath(); ctx.moveTo(px,py-hs*0.8); ctx.lineTo(px-hs*0.5,py); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px,py-hs*0.8); ctx.lineTo(px+hs*0.4,py); ctx.stroke();

    } else if(pose==='pranam'){
      // full prostration — bowing forward deeply
      var bowAngle = Math.PI*0.45 + 0.05*Math.sin((param.t||0));
      ctx.lineWidth=2.5*sc;
      // torso angled forward
      ctx.beginPath(); ctx.moveTo(px,py-hs*1.5);
      var tx2=px+Math.cos(bowAngle)*hs*2, ty2=py-hs*1.5-Math.sin(bowAngle)*hs*2;
      ctx.lineTo(tx2,ty2); ctx.stroke();
      // head at end of torso
      ctx.beginPath(); ctx.arc(tx2,ty2,hs*0.7,0,Math.PI*2); ctx.stroke();
      // arms on ground
      ctx.lineWidth=2*sc;
      ctx.beginPath(); ctx.moveTo(px+hs*0.5,py-hs*1); ctx.lineTo(px+hs*1.8,py-hs*1.2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px+hs*0.5,py-hs*1); ctx.lineTo(px+hs*1.8,py-hs*0.8); ctx.stroke();
      // legs bent
      ctx.beginPath(); ctx.moveTo(px,py-hs*0.8); ctx.lineTo(px-hs*0.6,py+hs*0.1); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px,py-hs*0.8); ctx.lineTo(px+hs*0.3,py+hs*0.1); ctx.stroke();

    } else if(pose==='pradakshina'){
      // walking with hands folded — position moves in circle
      var walkBob = Math.sin((param.t||0)*4)*2;
      ctx.lineWidth=2*sc;
      // folded hands
      ctx.beginPath(); ctx.moveTo(px,py-hs*2.2); ctx.lineTo(px+hs*0.5,py-hs*1.8+walkBob); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px,py-hs*2.2); ctx.lineTo(px-hs*0.3,py-hs*1.8+walkBob); ctx.stroke();
      ctx.fillStyle='#e8b84b';
      ctx.beginPath(); ctx.arc(px+hs*0.1,py-hs*1.7+walkBob,hs*0.3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=col;
      // walking legs
      var legPhase=(param.t||0)*3;
      ctx.lineWidth=2*sc;
      ctx.beginPath(); ctx.moveTo(px,py-hs*0.8); ctx.lineTo(px-hs*0.5+Math.sin(legPhase)*hs*0.3, py); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px,py-hs*0.8); ctx.lineTo(px+hs*0.5-Math.sin(legPhase)*hs*0.3, py); ctx.stroke();

    } else if(pose==='sit'){
      // sitting cross-legged meditating
      var breathe=Math.sin((param.t||0)*1.2)*1.5;
      ctx.lineWidth=2*sc;
      // arms resting on knees
      ctx.beginPath(); ctx.moveTo(px,py-hs*2.2); ctx.lineTo(px-hs*0.9,py-hs*1.5+breathe); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px,py-hs*2.2); ctx.lineTo(px+hs*0.9,py-hs*1.5+breathe); ctx.stroke();
      // crossed legs
      ctx.beginPath(); ctx.moveTo(px,py-hs*0.8); ctx.lineTo(px-hs*0.8,py-hs*0.2+breathe); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px,py-hs*0.8); ctx.lineTo(px+hs*0.8,py-hs*0.2+breathe); ctx.stroke();
      // halo of meditation
      ctx.strokeStyle='rgba(201,150,12,'+(0.15+0.1*Math.sin((param.t||0)*0.8))+')';
      ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(px,py-hs*3.2,hs*1.4,0,Math.PI*2); ctx.stroke();
      ctx.strokeStyle=col;

    } else if(pose==='bell'){
      // ringing bell — arm raised
      var bellSwing=Math.sin((param.t||0)*5)*12;
      ctx.lineWidth=2*sc;
      ctx.beginPath(); ctx.moveTo(px,py-hs*2.2); ctx.lineTo(px-hs*0.6,py-hs*1.5); ctx.stroke();
      // bell arm raised and swinging
      ctx.beginPath(); ctx.moveTo(px,py-hs*2.2);
      ctx.lineTo(px+hs*0.8,py-hs*3.0+bellSwing*0.05); ctx.stroke();
      // bell
      ctx.fillStyle='#c9960c';
      ctx.beginPath(); ctx.arc(px+hs*0.9,py-hs*3.1+bellSwing*0.05,hs*0.5,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#f5d080'; ctx.lineWidth=1; ctx.stroke();
      ctx.strokeStyle=col;
      // sound waves from bell
      if(Math.abs(bellSwing)>5){
        for(var r=1;r<=2;r++){
          ctx.strokeStyle='rgba(201,150,12,'+(0.5/r)+')';
          ctx.lineWidth=0.8;
          ctx.beginPath(); ctx.arc(px+hs*0.9,py-hs*3.1,hs*0.5*r*1.5,0,Math.PI*2); ctx.stroke();
        }
        ctx.strokeStyle=col;
      }
      // legs
      ctx.lineWidth=2*sc;
      ctx.beginPath(); ctx.moveTo(px,py-hs*0.8); ctx.lineTo(px-hs*0.5,py); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px,py-hs*0.8); ctx.lineTo(px+hs*0.4,py); ctx.stroke();

    } else if(pose==='aarti'){
      // waving aarti plate in circular motion
      var circX=Math.cos((param.t||0)*2)*hs*0.7;
      var circY=Math.sin((param.t||0)*2)*hs*0.5;
      ctx.lineWidth=2*sc;
      ctx.beginPath(); ctx.moveTo(px,py-hs*2.2); ctx.lineTo(px+circX,py-hs*2.0+circY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px,py-hs*2.2); ctx.lineTo(px-hs*0.6,py-hs*1.6); ctx.stroke();
      // aarti plate
      ctx.fillStyle='#c9960c';
      ctx.beginPath(); ctx.ellipse(px+circX,py-hs*1.9+circY,hs*0.55,hs*0.18,0.3,0,Math.PI*2); ctx.fill();
      // flame on plate
      var fl=0.7+0.3*Math.sin((param.t||0)*8);
      ctx.fillStyle='rgba(255,'+(Math.round(120+80*fl))+',20,0.95)';
      ctx.beginPath(); ctx.ellipse(px+circX,py-hs*2.15+circY,hs*0.18,hs*(0.32*fl),0,0,Math.PI*2); ctx.fill();
      // flame glow
      var fg=ctx.createRadialGradient(px+circX,py-hs*2.1+circY,0,px+circX,py-hs*2.1+circY,hs*0.55);
      fg.addColorStop(0,'rgba(255,180,40,0.45)'); fg.addColorStop(1,'rgba(255,180,40,0)');
      ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(px+circX,py-hs*2.1+circY,hs*0.55,0,Math.PI*2); ctx.fill();
      // legs
      ctx.strokeStyle=col; ctx.lineWidth=2*sc;
      ctx.beginPath(); ctx.moveTo(px,py-hs*0.8); ctx.lineTo(px-hs*0.5,py); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px,py-hs*0.8); ctx.lineTo(px+hs*0.4,py); ctx.stroke();

    } else {
      // default stand
      ctx.lineWidth=2*sc;
      ctx.beginPath(); ctx.moveTo(px,py-hs*2.2); ctx.lineTo(px-hs*0.7,py-hs*1.4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px,py-hs*2.2); ctx.lineTo(px+hs*0.7,py-hs*1.4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px,py-hs*0.8); ctx.lineTo(px-hs*0.5,py); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px,py-hs*0.8); ctx.lineTo(px+hs*0.4,py); ctx.stroke();
    }
  }

  // ground line
  function drawGround(y){
    ctx.strokeStyle='rgba(201,150,12,0.3)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(20,y); ctx.lineTo(320,y); ctx.stroke();
    // decorative dots
    ctx.fillStyle='rgba(201,150,12,0.2)';
    for(var x=30;x<320;x+=20){
      ctx.beginPath(); ctx.arc(x,y,1.5,0,Math.PI*2); ctx.fill();
    }
  }

  // label below animation
  function drawLabel(text){
    ctx.font='bold 10px "Tiro Devanagari Hindi",serif';
    ctx.fillStyle='rgba(232,184,75,0.7)';
    ctx.textAlign='center';
    ctx.fillText(text, 170, 210);
  }

        var sx=234+i*3, opacity=0.4+0.3*Math.abs(Math.sin(t*3+i));
        ctx.strokeStyle='rgba(100,160,255,'+opacity+')';

    function(){

    function(){

    // 7: Bilva — offering 3 leaves
    function(){

      drawLingam(210,138,0.72);

      function drawLeaf(lx,ly,rot){
        ctx.save(); ctx.translate(lx,ly); ctx.rotate(rot);
        ctx.fillStyle='#4a9a20';
        ctx.beginPath(); ctx.ellipse(0,0,8,14,0,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='#2a6a10'; ctx.lineWidth=0.7;
        ctx.beginPath(); ctx.moveTo(0,14); ctx.lineTo(0,-14); ctx.stroke();
        ctx.restore();
      }
      var bob2=Math.sin(t*2)*3;
      drawLeaf(90,140+bob2,-0.3);
      drawLeaf(105,133+bob2,0);
      drawLeaf(120,140+bob2,0.3);
      // arrow to lingam
      ctx.strokeStyle='rgba(201,150,12,0.4)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(125,137); ctx.lineTo(190,137); ctx.stroke();
      drawPerson(75,175,'offer',{t:t,sc:0.85});

    },
    // 8: Namakam — sitting and chanting with mala
    function(){

      drawGround(175);

      // rudraksha mala in hand
      ctx.strokeStyle='#8a4a20'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(120,148,14,0,Math.PI*1.2); ctx.stroke();
      for(var b2=0;b2<8;b2++){
        var ba=b2/8*Math.PI*1.2;
        ctx.fillStyle='#6a3010';
        ctx.beginPath(); ctx.arc(120+Math.cos(ba)*14,148+Math.sin(ba)*14,2.5,0,Math.PI*2); ctx.fill();
      }
      // sound waves from mouth (chanting)
      for(var w=1;w<=3;w++){
        var wa=0.2+0.15*Math.sin(t*3);
        ctx.strokeStyle='rgba(232,184,75,'+(wa/w)+')';
        ctx.lineWidth=0.8;
        ctx.beginPath(); ctx.arc(105,113,w*8,Math.PI*1.2,Math.PI*1.8); ctx.stroke();
      }
      drawLabel('नमकम — रुद्र जाप');
    },
    // 9: Alankara — applying tilak
    function(){
      drawBg();
      drawGround(175);
      drawLingam(200,138,0.75);
      drawPerson(90,175,'offer',{t:t,sc:0.9});
      // hand reaching to apply on lingam
      ctx.strokeStyle='#e8b84b'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(108,130); ctx.lineTo(185,118); ctx.stroke();
      // vibhuti lines on lingam
      ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=2;
      [-5,0,5].forEach(function(dy){
        ctx.beginPath(); ctx.moveTo(193,118+dy); ctx.lineTo(208,118+dy); ctx.stroke();
      });
      // flower garland arc
      var t3=t;
      ctx.strokeStyle='none';
      for(var fi=0;fi<12;fi++){
        var fa=fi/12*Math.PI+Math.PI;
        var fx=200+Math.cos(fa)*16, fy=110+Math.sin(fa)*12;
        ctx.fillStyle=fi%3===0?'#ff4488':fi%3===1?'#ffaa00':'#ff6644';
        ctx.beginPath(); ctx.arc(fx,fy,3,0,Math.PI*2); ctx.fill();
      }
      drawLabel('अलंकार — श्रृंगार');
    },
    // 10: Naivedya & Aarti — waving aarti
    function(){
      drawBg();
      drawGround(175);
      drawLingam(220,138,0.72);
      drawPerson(90,175,'aarti',{t:t,sc:0.9});
      // naivedya on plate to the right
      ctx.fillStyle='#c9960c';
      ctx.beginPath(); ctx.ellipse(290,162,22,6,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffaa44';
      ctx.beginPath(); ctx.arc(285,155,7,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ff4488';
      ctx.beginPath(); ctx.arc(295,154,5,0,Math.PI*2); ctx.fill();
      drawLabel('नैवेद्य और आरती');
    },
    // 11: Pradakshina — walking around lingam
    function(){
      drawBg();
      drawGround(175);
      drawLingam(170,138,0.72);
      // walking path circle
      ctx.strokeStyle='rgba(201,150,12,0.25)'; ctx.lineWidth=1.5; ctx.setLineDash([4,4]);
      ctx.beginPath(); ctx.ellipse(170,155,80,30,0,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
      // person walking around in circle
      var walkAngle=t*0.8;
      var walkX=170+Math.cos(walkAngle)*80;
      var walkY=155+Math.sin(walkAngle)*30;
      drawPerson(walkX,walkY,'pradakshina',{t:t,sc:0.75});
      // arrows showing direction
      [0,Math.PI/2,Math.PI,Math.PI*1.5].forEach(function(a2){
        var ax=170+Math.cos(a2)*80, ay=155+Math.sin(a2)*30;
        ctx.fillStyle='rgba(201,150,12,0.4)';
        ctx.save(); ctx.translate(ax,ay); ctx.rotate(a2+Math.PI/2);
        ctx.beginPath(); ctx.moveTo(0,-5); ctx.lineTo(4,3); ctx.lineTo(-4,3); ctx.closePath(); ctx.fill();
        ctx.restore();
      });
      drawLabel('प्रदक्षिणा — परिक्रमा');
    }
  ];

  // pick scene
  var sceneIdx = Math.min(stepIdx, scenes.length-1);

  function frame(){
    if(!document.getElementById('animStage').contains(canvas)) return;
    scenes[sceneIdx]();
    t += 0.018;
    window._animRAF = requestAnimationFrame(frame);
  }
  frame();
}


function shockwave(el){
  var rect=el.getBoundingClientRect();
  var cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  for(var r=0;r<3;r++){
    var ring=document.createElement('div');
    ring.style.cssText='position:fixed;pointer-events:none;z-index:9999;border-radius:50%;'
      +'border:2px solid rgba(45,188,78,'+(0.8-r*0.2)+');'
      +'left:'+(cx-10)+'px;top:'+(cy-10)+'px;width:20px;height:20px;'
      +'transition:all '+(0.5+r*0.1)+'s cubic-bezier(.2,.8,.4,1);opacity:1;';
    document.body.appendChild(ring);
    setTimeout(function(rr,delay){ rr.style.transform='scale('+(8+delay*3)+')'; rr.style.opacity='0'; },20+r*80,ring,r);
    setTimeout(function(rr){ rr.remove(); },700+r*100,ring);
  }
}

function burstParticles(el){
  var rect=el.getBoundingClientRect();
  var cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  var colors=['#f5d080','#e8b84b','#c9960c','#fff8e0','#ffdd55','#2dbc4e','#7eff9a'];
  // large particles
  for(var i=0;i<20;i++){
    var p=document.createElement('div');
    var angle=(i/20)*Math.PI*2 + Math.random()*0.3;
    var dist=50+Math.random()*60;
    var size=3+Math.random()*6;
    var color=colors[Math.floor(Math.random()*colors.length)];
    p.style.cssText='position:fixed;pointer-events:none;z-index:9999;border-radius:'+(Math.random()<0.5?'50%':'2px')
      +';width:'+size+'px;height:'+size+'px;background:'+color
      +';left:'+(cx-size/2)+'px;top:'+(cy-size/2)+'px'
      +';transition:all '+(0.5+Math.random()*0.3)+'s cubic-bezier(.25,.46,.45,.94)'
      +';box-shadow:0 0 6px '+color;
    document.body.appendChild(p);
    var tx=Math.cos(angle)*dist*(0.7+Math.random()*0.6);
    var ty=Math.sin(angle)*dist*(0.7+Math.random()*0.6);
    setTimeout(function(pp,x,y){ pp.style.transform='translate('+x+'px,'+y+'px) scale(0) rotate('+(Math.random()*360)+'deg)'; pp.style.opacity='0'; },15,p,tx,ty);
    setTimeout(function(pp){ pp.remove(); },900,p);
  }
}

function renderStep(idx,dir){
  var s=STEPS[idx];
  stopChant();
  if(ttsOn){synth.cancel();ttsOn=false;}
  document.getElementById('tbLabel').textContent='चरण '+(idx+1)+' / '+STEPS.length;
  document.getElementById('tbName').textContent=s.title;
  document.getElementById('tbCount').textContent=(idx+1)+'/'+STEPS.length;
  document.getElementById('tbProg').style.width=Math.round((idx+1)/STEPS.length*100)+'%';
  var prevBtn=document.getElementById('prevBtn');
  var nextBtn=document.getElementById('nextBtn');
  prevBtn.disabled=(idx===0);
  if(idx===STEPS.length-1){ nextBtn.textContent='🙏 पूजा सम्पन्न'; nextBtn.className='nav-btn complete'; }
  else{ nextBtn.textContent='अगला ▶'; nextBtn.className='nav-btn next'; }
  var scene=document.getElementById('stepScene');
  if(dir==='next'){
    scene.classList.add('slide-out');
    setTimeout(function(){ buildScene(s); scene.className='step-scene slide-in'; speakStep(s); },280);
  } else if(dir==='prev'){
    scene.style.animation='slideOut .3s ease forwards';
    setTimeout(function(){ buildScene(s); scene.className='step-scene'; scene.style.animation='slideIn .4s ease forwards'; speakStep(s); },280);
  } else { buildScene(s); speakStep(s); }
}

function speakStep(s){
  ttsOn=true;
  speakHindi(s.speak, 0.85, function(){
    ttsOn=false;
    // ensure bgOm is running
    if(!bgOmActive) startBgOm();
  });
}

function buildScene(s){
  buildAnim(cur);
  var content=document.getElementById('stepContent');
  var idx=STEPS.indexOf(s);
  var html='';
  html+='<div class="step-header">';
  html+='<div class="step-num-badge">'+(idx+1)+'</div>';
  html+='<div class="step-title">'+s.title+'</div>';
  html+='<div class="step-sub">'+s.sub+'</div>';
  html+='</div>';

  if(s.mantra!==null&&s.mantra!==undefined){
    var m=MANTRAS_CHANT[s.mantra.key];
    html+='<div class="mantra-box">';
    html+='<div class="mantra-label">🔔 इस चरण का मंत्र</div>';
    html+='<div class="mantra-text">'+m.display.replace(/\n/g,'<br>')+'</div>';
    html+='<div class="mantra-roman">'+m.roman.replace(/\n/g,'<br>')+'</div>';
    html+='<div class="mantra-btns">';
    html+='<button class="m-btn" data-once="1" data-key="'+s.mantra.key+'">▶ एक बार सुनें</button>';
    if(s.mantra.loop){
      html+='<button class="m-btn" data-loop="1" data-key="'+s.mantra.key+'" data-label="'+(s.mantra.label||s.title)+'">🔁 जाप शुरू करें</button>';
    }
    html+='</div></div>';
  }

  if(s.items){
    html+='<div class="mantra-label" style="margin-bottom:8px;font-family:Cinzel,serif;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--gold)">✅ आवश्यक सामग्री — टिक करें</div>';
    html+='<div class="items-grid">';
    for(var i=0;i<s.items.length;i++){
      var pts=s.items[i].split(' '); var em=pts[0]; var nm=pts.slice(1).join(' ');
      var emHtml2;
      if(em==='BIMG') emHtml2='<img src="'+BANANA_IMG+'" style="width:30px;height:26px;object-fit:contain"/>';
      else if(em==='SIMG') emHtml2='<img src="'+SUGAR_IMG+'" style="width:30px;height:30px;object-fit:contain"/>';
      else if(em==='DIMG') emHtml2='<img src="'+DHOTI_IMG+'" style="width:34px;height:34px;object-fit:contain"/>';
      else if(em==='AIMG') emHtml2='<img src="'+AKSHAT_IMG+'" style="width:32px;height:28px;object-fit:cover;border-radius:4px"/>';
      else if(em==='BPIMG') emHtml2='<img src="'+BELPATRA_IMG+'" style="width:32px;height:32px;object-fit:contain"/>';
      else emHtml2=em;
      html+='<div class="item-chip">'
          +'<div class="chip-inner">'
          +'<div class="chip-liquid"></div>'
          +'<div class="tick">✓</div>'
          +'<span class="chip-icon">'+emHtml2+'</span>'
          +'<p class="chip-label">'+nm+'</p>'
          +'</div>'
          +'</div>';
    }
    html+='</div>';
  }

  // progress bar — tracks how many instructions tapped/done
  html+='<div class="instr-progress"><div class="instr-progress-bar" id="instrProg" style="width:0%"></div></div>';
  html+='<ul class="instr-list" id="instrList">';
  for(var j=0;j<s.inst.length;j++){
    html+='<li data-idx="'+j+'">'
        +'<span class="inst-num">'+(j+1)+'</span>'
        +'<span class="inst-text">'+s.inst[j]+'</span>'
        +'</li>';
  }
  html+='</ul>';

  if(s.tip){ html+='<div class="tip-box">💡 <span>'+s.tip+'</span></div>'; }

  content.innerHTML=html;

  // 3D magnetic tilt + sparkles on mousemove
  content.querySelectorAll('.item-chip').forEach(function(chip){
    chip.addEventListener('mousemove', function(e){
      if(this.classList.contains('checked')) return;
      var r=this.getBoundingClientRect();
      var x=(e.clientX-r.left)/r.width - 0.5;
      var y=(e.clientY-r.top)/r.height - 0.5;
      this.style.transform='perspective(400px) rotateY('+(x*22)+'deg) rotateX('+(-y*22)+'deg) scale(1.08)';
      this.querySelector('.chip-inner').style.boxShadow=
        (x*12)+'px '+(y*12)+'px 30px rgba(201,150,12,0.25),'
        +(-x*4)+'px '+(-y*4)+'px 20px rgba(100,160,255,0.1)';
      // spawn sparkle
      if(Math.random()<0.3){
        var sp=document.createElement('div');
        sp.className='chip-sparkle';
        sp.style.cssText='left:'+(e.clientX-r.left)+'px;top:'+(e.clientY-r.top)+'px;'
          +'width:'+(3+Math.random()*4)+'px;height:'+(3+Math.random()*4)+'px;'
          +'position:absolute;border-radius:50%;pointer-events:none;z-index:5;'
          +'background:'+(Math.random()<0.5?'#f5d080':'#ffffff')+';'
          +'transition:all .4s ease-out;opacity:0.9;';
        this.querySelector('.chip-inner').appendChild(sp);
        var tx=(Math.random()-0.5)*40, ty=(Math.random()-0.5)*40;
        setTimeout(function(s,tx,ty){ s.style.transform='translate('+tx+'px,'+ty+'px) scale(0)'; s.style.opacity='0'; },10,sp,tx,ty);
        setTimeout(function(s){ s.remove(); },420,sp);
      }
    });
    chip.addEventListener('mouseleave', function(){
      this.style.transform='';
      this.querySelector('.chip-inner').style.boxShadow='';
    });
    chip.addEventListener('click', function(){
      var wasChecked=this.classList.contains('checked');
      this.classList.toggle('checked');
      if(!wasChecked){
        // SPECTACULAR check: shockwave + fireworks + screen flash
        burstParticles(this);
        shockwave(this);
        // brief white flash on the card
        var fl=document.createElement('div');
        fl.style.cssText='position:absolute;inset:0;border-radius:16px;background:rgba(255,255,255,0.5);pointer-events:none;z-index:10;transition:opacity .3s';
        this.querySelector('.chip-inner').appendChild(fl);
        setTimeout(function(f){f.style.opacity='0';},20,fl);
        setTimeout(function(f){f.remove();},350,fl);
        // lock tilt while checked
        this.style.transform='';
      }
    });
  });
  // Show ALL instructions together with staggered entrance animation
  var instrItems = content.querySelectorAll('.instr-list li');
  instrItems.forEach(function(li, i){
    setTimeout(function(){
      li.classList.add('revealed');
      // first one gets active highlight briefly
      if(i === 0) li.classList.add('active-inst');
    }, i * 120);
  });

  // tap to mark done / undo
  instrItems.forEach(function(li){
    li.addEventListener('click', function(){
      this.classList.remove('active-inst');
      this.classList.toggle('done');
      // speak it when tapped
      speakHindi(this.querySelector('.inst-text').textContent, 0.9, null);
      // update progress bar
      var done = content.querySelectorAll('.instr-list li.done').length;
      var prog = content.querySelector('#instrProg');
      if(prog) prog.style.width = Math.round(done/instrItems.length*100)+'%';
    });
  });

  content.querySelectorAll('.m-btn[data-once]').forEach(function(btn){
    btn.addEventListener('click',function(){
      stopChant();
      var key=parseInt(this.getAttribute('data-key'));
      var mc=MANTRAS_CHANT[key];
      this.classList.add('playing');
      var self=this;
      speakHindi(mc.tts, 0.65, function(){ self.classList.remove('playing'); });
    });
  });
  content.querySelectorAll('.m-btn[data-loop]').forEach(function(btn){
    btn.addEventListener('click',function(){
      if(chanting){
        stopChant(); this.textContent='🔁 जाप शुरू करें'; this.classList.remove('loop-on');
      } else {
        var key=parseInt(this.getAttribute('data-key'));
        var label=this.getAttribute('data-label')||'';
        startChant(key,label);
        this.textContent='■ जाप रोकें'; this.classList.add('loop-on');
      }
    });
  });
}

(function(){
  var canvas = document.getElementById('splashCanvas');
  var ctx = canvas.getContext('2d');
  var W, H, raf;
  var t = 0;
  var stars = [];
  var boatX = -60;

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    stars = [];
    for(var i=0;i<120;i++){
      stars.push({x:Math.random()*W, y:Math.random()*H*0.55, r:Math.random()*1.4+0.3, s:Math.random()*0.5+0.3});
    }
  }
  window.addEventListener('resize', resize);
  resize();

  function drawSky(){
    var g = ctx.createLinearGradient(0,0,0,H*0.62);
    g.addColorStop(0,'#010810');
    g.addColorStop(0.4,'#041628');
    g.addColorStop(0.7,'#0a2a4a');
    g.addColorStop(1,'#0d3060');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H*0.62);
  }

  function drawStars(){
    stars.forEach(function(s){
      var twinkle = 0.5 + 0.5*Math.sin(t*s.s + s.x);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle='rgba(255,255,240,'+twinkle.toFixed(2)+')';
      ctx.fill();
    });
  }

  function drawMoon(){
    var mx = W*0.82, my = H*0.1;
    // outer glow
    var mg = ctx.createRadialGradient(mx,my,4,mx,my,48);
    mg.addColorStop(0,'rgba(200,220,255,0.25)');
    mg.addColorStop(1,'rgba(200,220,255,0)');
    ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(mx,my,48,0,Math.PI*2); ctx.fill();
    // moon body
    ctx.fillStyle='#c8d8f0'; ctx.beginPath(); ctx.arc(mx,my,20,0,Math.PI*2); ctx.fill();
    // crater
    ctx.fillStyle='rgba(0,0,0,0.08)'; ctx.beginPath(); ctx.arc(mx+6,my-4,6,0,Math.PI*2); ctx.fill();
  }

  function drawTemple(){
    var cx = W/2;
    var base = H*0.62;
    var sc = Math.min(W/400, H/700) * 1.1;

    ctx.save();
    ctx.translate(cx, base);
    ctx.scale(sc, sc);

    // ── stone gradient ──
    var stoneG = ctx.createLinearGradient(0,-300,0,0);
    stoneG.addColorStop(0,'#c8a86a'); stoneG.addColorStop(1,'#6a4a28');
    var goldG = ctx.createLinearGradient(0,-320,0,-60);
    goldG.addColorStop(0,'#f5d080'); goldG.addColorStop(0.5,'#c9960c'); goldG.addColorStop(1,'#8a5800');

    // ── back spires ──
    ctx.fillStyle=stoneG;
    ctx.beginPath(); ctx.moveTo(-180,0); ctx.lineTo(-165,-110); ctx.lineTo(-150,0); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(150,0); ctx.lineTo(165,-110); ctx.lineTo(180,0); ctx.closePath(); ctx.fill();
    // rings on back spires
    [[-165,-60],[-165,-80],[-165,-100],[165,-60],[165,-80],[165,-100]].forEach(function(p){
      ctx.fillStyle=goldG; ctx.beginPath(); ctx.ellipse(p[0],p[1],9,3,0,0,Math.PI*2); ctx.fill();
    });

    // ── left main subsidiary spire ──
    ctx.fillStyle=stoneG;
    ctx.beginPath(); ctx.moveTo(-110,0); ctx.lineTo(-90,-185); ctx.lineTo(-70,0); ctx.closePath(); ctx.fill();
    [-90,-70,-90,-100,-90,-130,-90,-155,-90,-175].forEach(function(y,i){
      if(i%2===0){
        ctx.fillStyle=goldG; ctx.beginPath(); ctx.ellipse(-90,y,13-i*0.4,4,0,0,Math.PI*2); ctx.fill();
      }
    });
    // kalash left
    ctx.fillStyle=goldG; ctx.beginPath(); ctx.ellipse(-90,-180,6,2.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillRect(-92,-196,4,18); ctx.beginPath(); ctx.arc(-90,-198,5,0,Math.PI*2); ctx.fill();

    // ── right main subsidiary spire ──
    ctx.fillStyle=stoneG;
    ctx.beginPath(); ctx.moveTo(70,0); ctx.lineTo(90,-185); ctx.lineTo(110,0); ctx.closePath(); ctx.fill();
    [90,-70,90,-100,90,-130,90,-155,90,-175].forEach(function(x,i){
      ctx.fillStyle=goldG; ctx.beginPath(); ctx.ellipse(x,-70-(i*26),13-i*0.4,4,0,0,Math.PI*2); ctx.fill();
    });
    ctx.fillStyle=goldG; ctx.beginPath(); ctx.ellipse(90,-180,6,2.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillRect(88,-196,4,18); ctx.beginPath(); ctx.arc(90,-198,5,0,Math.PI*2); ctx.fill();

    // ── MAIN CENTRAL SHIKHARA ──
    ctx.fillStyle=stoneG;
    ctx.beginPath(); ctx.moveTo(0,-300); ctx.lineTo(-65,0); ctx.lineTo(65,0); ctx.closePath(); ctx.fill();
    // shikhara rings
    var ringPositions=[-60,-90,-120,-150,-180,-210,-240,-268,-285];
    var ringWidths=[60,55,50,44,38,30,22,14,8];
    ringPositions.forEach(function(y,i){
      ctx.fillStyle=goldG; ctx.beginPath(); ctx.ellipse(0,y,ringWidths[i],5,0,0,Math.PI*2); ctx.fill();
    });
    // main kalash
    ctx.fillStyle=goldG; ctx.beginPath(); ctx.ellipse(0,-292,9,3.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillRect(-3,-316,6,26);
    ctx.beginPath(); ctx.arc(0,-320,7,0,Math.PI*2); ctx.fill();
    // trishul on top
    ctx.strokeStyle='#f5d080'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,-328); ctx.lineTo(0,-345); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-5,-338); ctx.lineTo(5,-338); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-7,-333); ctx.lineTo(0,-326); ctx.lineTo(7,-333); ctx.stroke();

    // ── temple base walls ──
    ctx.fillStyle=stoneG; ctx.fillRect(-130,0,260,18);
    ctx.fillStyle='#5a3a18'; ctx.fillRect(-140,14,280,8);

    // ── doors ──
    ctx.fillStyle='#0a0508';
    // main door
    ctx.beginPath(); ctx.rect(-18,-12,36,14); ctx.fill();
    ctx.beginPath(); ctx.arc(0,-12,18,Math.PI,0); ctx.fillStyle='#c9960c'; ctx.fill();
    // side doors
    ctx.fillStyle='#0a0508';
    ctx.beginPath(); ctx.rect(-95,-10,18,12); ctx.fill();
    ctx.beginPath(); ctx.rect(77,-10,18,12); ctx.fill();

    // ── diya lamps on steps ──
    var diyas=[-90,-60,-30,0,30,60,90];
    diyas.forEach(function(x){
      var flicker = 0.7+0.3*Math.sin(t*4+x);
      ctx.fillStyle='rgba(255,160,40,'+flicker+')';
      ctx.beginPath(); ctx.arc(x,5,3,0,Math.PI*2); ctx.fill();
      // glow
      var dg=ctx.createRadialGradient(x,5,0,x,5,10);
      dg.addColorStop(0,'rgba(255,160,40,0.4)'); dg.addColorStop(1,'rgba(255,160,40,0)');
      ctx.fillStyle=dg; ctx.beginPath(); ctx.arc(x,5,10,0,Math.PI*2); ctx.fill();
    });

    // ── golden glow at shikhara base ──
    var tempGlow=ctx.createRadialGradient(0,0,20,0,0,80);
    tempGlow.addColorStop(0,'rgba(201,150,12,0.2)'); tempGlow.addColorStop(1,'rgba(201,150,12,0)');
    ctx.fillStyle=tempGlow; ctx.beginPath(); ctx.ellipse(0,0,80,20,0,0,Math.PI*2); ctx.fill();

    ctx.restore();
  }

  function drawGanga(){
    var riverY = H*0.62;
    var riverH = H*0.38;

    // base river
    var rg = ctx.createLinearGradient(0,riverY,0,H);
    rg.addColorStop(0,'#0d3a6a');
    rg.addColorStop(0.3,'#0a2a50');
    rg.addColorStop(1,'#051828');
    ctx.fillStyle=rg; ctx.fillRect(0,riverY,W,riverH);

    // animated waves — multiple layers
    for(var layer=0;layer<4;layer++){
      var spd = 0.4 + layer*0.3;
      var amp = 4 + layer*2;
      var freq = 0.015 - layer*0.002;
      var yoff = riverY + 20 + layer*18;
      var alpha = 0.12 - layer*0.02;
      ctx.beginPath();
      ctx.moveTo(0, yoff);
      for(var x=0;x<=W;x+=4){
        var y = yoff + amp*Math.sin(freq*x + t*spd) + (amp*0.5)*Math.sin(freq*1.7*x - t*spd*0.7);
        ctx.lineTo(x,y);
      }
      ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
      ctx.fillStyle='rgba(100,160,255,'+alpha+')'; ctx.fill();
    }

    // surface shimmer lines
    for(var sl=0;sl<8;sl++){
      var sy = riverY + 30 + sl*22;
      var sph = 0.3 + 0.7*Math.abs(Math.sin(t*0.8+sl));
      ctx.strokeStyle='rgba(150,200,255,'+sph.toFixed(2)+')';
      ctx.lineWidth=0.8;
      ctx.beginPath();
      var sx0 = (t*60*(sl%2===0?1:-1) + sl*200) % (W*1.5) - W*0.25;
      ctx.moveTo(sx0, sy + 3*Math.sin(t+sl));
      ctx.bezierCurveTo(sx0+30,sy-4,sx0+60,sy+6,sx0+90,sy);
      ctx.stroke();
    }

    // GHATS (stone steps)
    var ghatG=ctx.createLinearGradient(0,riverY-10,0,riverY+40);
    ghatG.addColorStop(0,'#8a6a40'); ghatG.addColorStop(1,'#4a3020');
    // left ghat
    ctx.fillStyle=ghatG;
    for(var g=0;g<5;g++){
      ctx.fillRect(0, riverY+g*8-10, W*0.22-g*10, 8);
    }
    // right ghat
    for(var g=0;g<5;g++){
      ctx.fillRect(W-(W*0.22-g*10), riverY+g*8-10, W*0.22-g*10, 8);
    }

    // temple reflection in water
    var reflY = riverY + 10;
    ctx.save();
    ctx.globalAlpha = 0.18 + 0.06*Math.sin(t*0.5);
    ctx.translate(W/2, reflY);
    ctx.scale(1,-0.35);
    ctx.translate(-W/2,-reflY);
    drawTempleReflection();
    ctx.restore();

    // floating diyas on Ganga
    var diyaCount = 7;
    for(var d=0;d<diyaCount;d++){
      var dx = (W*0.1 + d*(W*0.13) + t*25*(d%2===0?1:0.7)) % (W*1.1) - W*0.05;
      var dy = riverY + 55 + 12*Math.sin(t*0.6+d) + d*8;
      if(dy > H) continue;
      // diya base
      ctx.fillStyle='rgba(180,130,60,0.9)';
      ctx.beginPath(); ctx.ellipse(dx,dy,10,4,0,0,Math.PI*2); ctx.fill();
      // flame
      var flk=0.7+0.3*Math.sin(t*5+d);
      ctx.fillStyle='rgba(255,'+(int(140+60*flk))+',30,0.95)';
      ctx.beginPath(); ctx.ellipse(dx,dy-5,3,5*flk,0,0,Math.PI*2); ctx.fill();
      // flame glow
      var fg=ctx.createRadialGradient(dx,dy-5,0,dx,dy-5,15);
      fg.addColorStop(0,'rgba(255,180,40,0.4)'); fg.addColorStop(1,'rgba(255,180,40,0)');
      ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(dx,dy-5,15,0,Math.PI*2); ctx.fill();
      // water reflection of diya
      ctx.fillStyle='rgba(255,160,30,0.15)';
      ctx.beginPath(); ctx.ellipse(dx,dy+10,8,3,0,0,Math.PI*2); ctx.fill();
    }

    // OM on water
    ctx.font='bold 22px serif';
    ctx.fillStyle='rgba(232,184,75,'+(0.3+0.15*Math.sin(t*0.7))+')';
    ctx.textAlign='center';
    ctx.fillText('ॐ', W/2, H*0.88);
  }

  function int(n){ return Math.round(n); }

  function drawTempleReflection(){
    var cx=W/2, base=H*0.62, sc=Math.min(W/400,H/700)*1.1;
    ctx.save(); ctx.translate(cx,base); ctx.scale(sc,sc);
    ctx.fillStyle='#c9960c';
    ctx.beginPath(); ctx.moveTo(0,-300); ctx.lineTo(-65,0); ctx.lineTo(65,0); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-110,0); ctx.lineTo(-90,-185); ctx.lineTo(-70,0); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(70,0); ctx.lineTo(90,-185); ctx.lineTo(110,0); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  function drawFogLayer(){
    var fg=ctx.createLinearGradient(0,H*0.55,0,H*0.68);
    fg.addColorStop(0,'rgba(3,8,15,0)');
    fg.addColorStop(0.5,'rgba(10,30,60,0.35)');
    fg.addColorStop(1,'rgba(3,8,15,0)');
    ctx.fillStyle=fg; ctx.fillRect(0,H*0.55,W,H*0.13);
  }

  // floating boat
  function drawBoat(){
    boatX += 0.4;
    if(boatX > W+80) boatX=-80;
    var by = H*0.66 + 4*Math.sin(t*0.8);
    ctx.save(); ctx.translate(boatX, by);
    // hull
    ctx.fillStyle='#5a3a18';
    ctx.beginPath(); ctx.moveTo(-25,0); ctx.lineTo(25,0); ctx.lineTo(18,10); ctx.lineTo(-18,10); ctx.closePath(); ctx.fill();
    // sail
    ctx.fillStyle='rgba(232,184,75,0.7)';
    ctx.beginPath(); ctx.moveTo(0,-30); ctx.lineTo(0,0); ctx.lineTo(18,-10); ctx.closePath(); ctx.fill();
    // mast
    ctx.strokeStyle='#8a6030'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-32); ctx.stroke();
    // flag
    ctx.fillStyle='#c9960c';
    ctx.beginPath(); ctx.moveTo(0,-32); ctx.lineTo(8,-27); ctx.lineTo(0,-24); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  function frame(){
    if(!document.getElementById('splash') || document.getElementById('splash').style.display==='none') return;
    ctx.clearRect(0,0,W,H);
    drawSky();
    drawStars();
    drawMoon();
    drawTemple();
    drawFogLayer();
    drawGanga();
    drawBoat();
    t += 0.016;
    raf = requestAnimationFrame(frame);
  }

  frame();
  window.splashRAF = raf;
  window.stopSplash = function(){ cancelAnimationFrame(raf); };
})();

// ============================================================
// HAR HAR MAHADEV — Web Audio Synthesis
// ============================================================
function playHarHarMahadev(){
  try {
    loadVoice();
    var ac = new (window.AudioContext||window.webkitAudioContext)();
    if(ac.state==='suspended') ac.resume();
    var master = ac.createGain();
    master.gain.value = 0.0;
    master.connect(ac.destination);
    master.gain.linearRampToValueAtTime(0.9, ac.currentTime+0.5);

    // deep temple bell function
    function bell(freq, t0, vol){
      var o=ac.createOscillator(), g=ac.createGain();
      o.type='sine'; o.frequency.value=freq;
      g.gain.setValueAtTime(0,t0);
      g.gain.linearRampToValueAtTime(vol,t0+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t0+4);
      o.connect(g); g.connect(master); o.start(t0); o.stop(t0+4.5);
      // overtone
      var o2=ac.createOscillator(), g2=ac.createGain();
      o2.type='sine'; o2.frequency.value=freq*2.756;
      g2.gain.setValueAtTime(0,t0); g2.gain.linearRampToValueAtTime(vol*0.25,t0+0.02);
      g2.gain.exponentialRampToValueAtTime(0.001,t0+2);
      o2.connect(g2); g2.connect(master); o2.start(t0); o2.stop(t0+2.5);
    }

    // deep drone
    function drone(freq, t0, dur, vol){
      var o=ac.createOscillator(), g=ac.createGain();
      o.type='sawtooth'; o.frequency.value=freq;
      var f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=500;
      g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(vol,t0+1);
      g.gain.setValueAtTime(vol,t0+dur-1); g.gain.linearRampToValueAtTime(0,t0+dur);
      o.connect(f); f.connect(g); g.connect(master); o.start(t0); o.stop(t0+dur);
    }

    var now = ac.currentTime + 0.2;

    // grand opening bell sequence
    bell(130.81, now,      0.6);
    bell(164.81, now+0.2,  0.5);
    bell(196,    now+0.4,  0.45);
    bell(261.63, now+0.6,  0.55);

    // deep background drone
    drone(65.41, now+0.3, 18, 0.15);
    drone(98,    now+0.3, 18, 0.10);

    // rhythmic bells continuing
    [2.5, 4.0, 5.5, 7.0, 8.5, 10.0, 12.0].forEach(function(dt){
      bell(196, now+dt, 0.25);
    });

    // Har Har Mahadev TTS — spoken 3 times powerfully
    var synth2 = window.speechSynthesis;
    synth2.cancel();

    function speakWarcry(text, rate, pitch, onEnd){
      var u = new SpeechSynthesisUtterance(text);
      u.lang='hi-IN'; if(hv) u.voice=hv;
      u.rate=rate; u.pitch=pitch; u.volume=1.0;
      u.onend = onEnd||function(){};
      u.onerror = onEnd||function(){};
      synth2.speak(u);
    }

    // First cry — slow and powerful
    speakWarcry('हर हर महादेव!', 0.65, 0.75, function(){
      setTimeout(function(){
        // Second cry — stronger
        speakWarcry('हर हर महादेव!', 0.70, 0.78, function(){
          setTimeout(function(){
            // Third cry — full war cry
            speakWarcry('हर हर महादेव! बोलो हर हर महादेव! जय काशी विश्वनाथ!', 0.75, 0.8, null);
          }, 400);
        });
      }, 500);
    });

    return ac;
  } catch(e){ console.log('Audio error:',e); return null; }
}

// Auto-play Har Har Mahadev as soon as splash screen is visible
// Browsers require a tiny delay — we play on first user interaction OR auto after 500ms
var harPlayed = false;
function tryPlayHar(){
  if(harPlayed) return;
  harPlayed = true;
  playHarHarMahadev();
}

// Try auto-play immediately (works on mobile if page just loaded)
setTimeout(function(){ tryPlayHar(); }, 600);

// Also trigger on any touch/click on splash (catches strict autoplay policies)
document.getElementById('splash').addEventListener('click', function(){ tryPlayHar(); }, {once:true});
document.getElementById('splash').addEventListener('touchstart', function(){ tryPlayHar(); }, {once:true});

document.getElementById('startBtn').addEventListener('click',function(){
  tryPlayHar(); // ensure it plays if autoplay was blocked
  setTimeout(function(){
    document.getElementById('splash').classList.add('hide');
    setTimeout(function(){
      if(window.stopSplash) window.stopSplash();
      document.getElementById('splash').style.display='none';
      document.getElementById('app').style.display='block';
      loadVoice();
      setTimeout(startBgOm, 2000);
      renderStep(0,null);
    }, 1200);
  }, 800);
});
